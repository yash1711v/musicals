name: music_app
description: Secure audio practice deck for protected backing tracks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  encrypt: ^5.0.3
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.3.0
  flutter_windowmanager: ^0.2.0
  get_it: ^9.2.1
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  screen_protector: ^1.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/sample_backing_loop.wav
